hydra:
  run:
    dir: ./experiments/${scenario}/${dataset}_${initial_increment}-${increment}-${method}
  job:
    chdir: true

  job_logging:
    version: 1
    formatters:
      simple:
        format: '%(message)s'

class_order: ""
dataset_root: ""
workdir: ""
log_path: "metrics.json"
model_name: "ViT-B/16"
prompt_template: "a bad photo of a {}."

batch_size: 64
increment: ${initial_increment}
initial_increment: 10  
task_num: 10 
scenario: "class"
dataset: "cifar100"

weight_decay: 0.0
l2: 0
ce_method: 0

method: "DMNSP"

lr: 1e-3
ls: 0.0


visual_clsf_lr: 0.0005
visual_clsf_batch_size: 64
visual_clsf_epochs: 3
a: 1
b: 4



D: 5000
sigma: 1.0
num_ensembles: 5
seed: 11